<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaditya Vikram | Movies</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/movies.css" />
</head>
<script id="no-rclick">
    document.addEventListener('contextmenu', function (e) {
      e.preventDefault();
    });
</script>
<script id="no-drag">
    document.addEventListener('dragstart', function (e) {
      e.preventDefault();
    });
</script>
<body>
<div class="container">
    <header>
        <div class="title-block">
            <h1>Movies</h1>
            <span id="movie-count"></span>
        </div>
        <a href="mediarecommendations.html">Back</a>
    </header>

    <section class="card" id="movies">
        <section class="card">
            <div class="filters">

                <div class="filter-item">
                    <select id="yearFilter"></select>
                </div>

                <div class="filter-item">
                    <select id="genreFilter"></select>
                </div>

                <div class="filter-item">
                    <select id="animatedFilter">
                        <option value="">Types</option>
                        <option value="true">Animated</option>
                        <option value="false">Non-Animated</option>
                    </select>
                </div>

                <div class="filter-item">
                    <select id="languageFilter"></select>
                </div>

            </div>
        </section>
        <div class="gallery" id="gallery"></div>
        <div id="pagination" style="display:flex; justify-content:center; gap:6px; flex-wrap:wrap; margin-top:10px;"></div>
    </section>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">

        <div class="close-btn" id="close-btn">✕</div>

        <div class="lightbox-content">

            <!-- LEFT -->
            <div class="lightbox-left">
                <img id="lightbox-img" src="" alt="Expanded">
                <div id="lightbox-title" style="margin-top:8px; color:#ef4444; font-size:0.9rem;"></div>
                <div id="lightbox-length" style="margin-top:8px; color:#ef4444; font-size:0.8rem;"></div>
            </div>

            <!-- RIGHT -->
            <div class="lightbox-right">
                <div id="lightbox-genres"></div>
                <p id="lightbox-language" style="color:#9ca3af; margin-top:8px; font-size:0.9rem;"></p>
                <p id="lightbox-director" style="color:#9ca3af; margin-top:8px; font-size:0.9rem;"></p>
                <p id="lightbox-desc" style="color:#9ca3af; margin-top:8px; font-size:0.9rem;"></p>
            </div>

        </div>

    </div>

    <button id="topBtn" style="position:fixed; bottom:20px; right:20px; display:none; background:#111111; color:#ef4444; border:1px solid #ef4444; padding:8px 12px; border-radius:8px; cursor:pointer;">
        Top
    </button>

    <footer>
        © 2026 Aaditya Vikram
    </footer>

</div>
<script src="js/movies.js"></script>
</body>
</html>
